name: pearline_dental
description: Pearlline Multispeciality Dentocare Patient App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  dio: ^5.4.0
  get_storage: ^2.1.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  url_launcher: ^6.2.5
  intl: ^0.20.2
  intl_phone_field: ^3.2.0
  cupertino_icons: ^1.0.6
  youtube_player_flutter: ^10.0.1
  flutter_html: ^3.0.0
  google_fonts: ^8.1.0
  photo_view: ^0.15.0
  curved_navigation_bar: ^1.0.6
  flutter_carousel_widget: ^3.1.0
  flutter_staggered_grid_view: ^0.7.0
  razorpay_flutter: ^1.4.5
  image_picker: ^1.2.2
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter_local_notifications: ^22.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/